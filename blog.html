/* ============================================================
   RENDER LOGIC — you shouldn't need to touch anything below
   ============================================================ */
const grid = document.getElementById('postGrid');
const filtersEl = document.getElementById('filters');
const searchInput = document.getElementById('searchInput');
const resultCount = document.getElementById('resultCount');

const categories = ["All", ...new Set(posts.map(p => p.category))];
let activeFilter = "All";
let searchTerm = "";

function renderFilters(){
  filtersEl.innerHTML = categories.map(c =>
    `<button class="filter-btn ${c === activeFilter ? 'active' : ''}" data-cat="${c}">${c}</button>`
  ).join('');
  filtersEl.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.cat;
      renderFilters();
      renderGrid();
    });
  });
}

function formatDate(d){
  const date = new Date(d);
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function renderGrid(){
  const term = searchTerm.trim().toLowerCase();
  const filtered = posts.filter(p => {
    const matchesCat = activeFilter === "All" || p.category === activeFilter;
    const matchesSearch = !term ||
      p.title.toLowerCase().includes(term) ||
      p.excerpt.toLowerCase().includes(term) ||
      p.tags.some(t => t.includes(term));
    return matchesCat && matchesSearch;
  });

  resultCount.textContent = `${filtered.length} ${filtered.length === 1 ? 'entry' : 'entries'}`;

  if(filtered.length === 0){
    grid.innerHTML = `<div class="empty-state">No entries match that search. Try a different term or filter.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <article class="card" data-id="${p.id}" tabindex="0" role="button" aria-label="Open entry: ${p.title}">
      <div class="card-top">
        <span class="log-id mono">${p.id}</span>
        <span class="card-date mono">${formatDate(p.date)}</span>
      </div>
      <h3>${p.title}</h3>
      <p>${p.excerpt}</p>
      <div class="card-tags">${p.tags.map(t => `<span class="pill">#${t}</span>`).join('')}</div>
    </article>
  `).join('');

  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openModal(card.dataset.id));
    card.addEventListener('keypress', (e) => { if(e.key === 'Enter') openModal(card.dataset.id); });
  });
}

const overlay = document.getElementById('modalOverlay');
const modalClose = document.getElementById('modalClose');

function openModal(id){
  const post = posts.find(p => p.id === id);
  if(!post) return;
  document.getElementById('modalLogId').textContent = `${post.id} — ${formatDate(post.date)}`;
  document.getElementById('modalTitle').textContent = post.title;
  document.getElementById('modalTags').innerHTML = post.tags.map(t => `<span class="pill">#${t}</span>`).join('');
  document.getElementById('modalBody').innerHTML = post.body.map(par => `<p>${par}</p>`).join('');
  overlay.classList.add('open');
  modalClose.focus();
}
function closeModal(){ overlay.classList.remove('open'); }
modalClose.addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => { if(e.target === overlay) closeModal(); });
document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });

searchInput.addEventListener('input', (e) => {
  searchTerm = e.target.value;
  renderGrid();
});

renderFilters();
renderGrid();
</script>
